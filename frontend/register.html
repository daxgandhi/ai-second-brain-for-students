<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — AI Second Brain</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-grid"></div>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="brand">AI <span>Second Brain</span></div>
      <div class="tagline">For Students</div>
    </div>

    <h2 class="auth-title">Create your account 🎓</h2>
    <p class="auth-subtitle">Start studying smarter with AI assistance</p>

    <!-- Messages -->
    <div id="message-area"></div>

    <!-- Register Form -->
    <form id="register-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your full name" required minlength="2" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@university.edu" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter password" required autocomplete="new-password" />
      </div>
      <button type="submit" id="register-btn" class="btn btn-primary btn-full">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in →</a>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    Auth.redirectIfLoggedIn();

    const form      = document.getElementById('register-form');
    const regBtn    = document.getElementById('register-btn');
    const msgArea   = document.getElementById('message-area');

    function showMessage(text, type) {
      msgArea.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgArea.innerHTML = '';

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm-password').value;

      // Client-side validation
      if (password !== confirm) {
        return showMessage('❌ Passwords do not match', 'error');
      }
      if (password.length < 6) {
        return showMessage('❌ Password must be at least 6 characters', 'error');
      }

      setLoading(regBtn, true);

      try {
        const data = await apiCall('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ name, email, password })
        });

        Auth.save(data.token, data.user);
        Toast.success('Account created! Welcome aboard 🎉');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);

      } catch (err) {
        showMessage('❌ ' + err.message, 'error');
        setLoading(regBtn, false);
      }
    });
  </script>
</body>
</html>
